
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillOrbit - Jobs</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
    color:#e2e8f0;
}

/* HEADER */
.header{
    padding:20px 5%;
    background:#1e293b;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:1.5rem;
    font-weight:bold;
}
.logo span{ color:#22c55e; }

.back-btn{
    background:#22c55e;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
    color:#0f172a;
    font-weight:600;
}

/* SEARCH */
.search{
    padding:15px 5%;
}

.search input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    outline:none;
}

/* CONTAINER */
.container{
    padding:10px 5%;
}

/* JOB CARD */
.job-card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
    transition:0.3s;
    border:1px solid #334155;
}

.job-card:hover{
    transform:translateY(-3px);
    border-color:#22c55e;
}

/* TOP */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.top h3{
    font-size:1rem;
    color:#22c55e;
}

.tag{
    font-size:12px;
    background:#0f172a;
    padding:3px 8px;
    border-radius:6px;
    border:1px solid #334155;
}

/* DESC */
p{
    font-size:0.85rem;
    color:#94a3b8;
    margin-top:5px;
}

/* BUTTON */
.btn{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:#0f172a;
    font-weight:600;
    cursor:pointer;
}

/* FILTER */
.filters{
    display:flex;
    gap:8px;
    padding:0 5%;
    margin-bottom:10px;
}

.filters button{
    flex:1;
    padding:8px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
    cursor:pointer;
}

.filters button.active{
    background:#22c55e;
    color:#0f172a;
}

/* POPUP */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    border:1px solid #22c55e;
    display:none;
    width:300px;
}

.popup h2{
    color:#22c55e;
}

.close{
    margin-top:10px;
    display:inline-block;
    background:#22c55e;
    color:#0f172a;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">SKILL<span>ORBIT</span></div>
    <a href="More.html" class="back-btn">← Back</a>
</div>

<!-- SEARCH -->
<div class="search">
    <input type="text" id="search" placeholder="Search jobs...">
</div>

<!-- FILTER -->
<div class="filters">
    <button class="active" onclick="filter('all', this)">All</button>
    <button onclick="filter('remote', this)">Remote</button>
    <button onclick="filter('freelance', this)">Freelance</button>
</div>

<div class="container" id="container"></div>

<!-- POPUP -->
<div class="popup" id="popup">
    <h2 id="title"></h2>
    <p id="desc"></p>
    <button class="btn" onclick="apply()">Apply Now</button>
    <div class="close" onclick="closePopup()">Close</div>
</div>

<script>

let jobs = [
    {title:"Frontend Developer", type:"remote", desc:"Build UI using HTML, CSS, JS"},
    {title:"Freelance Designer", type:"freelance", desc:"Create modern UI designs"},
    {title:"Backend Intern", type:"remote", desc:"Work with APIs & databases"},
    {title:"Content Writer", type:"freelance", desc:"Write tech articles"}
];

let currentFilter = "all";

// render
function render(){
    let box = document.getElementById("container");
    let search = document.getElementById("search").value.toLowerCase();

    box.innerHTML = "";

    let filtered = jobs.filter(j => {
        let matchFilter = currentFilter === "all" || j.type === currentFilter;
        let matchSearch = j.title.toLowerCase().includes(search);
        return matchFilter && matchSearch;
    });

    filtered.forEach(j => {
        box.innerHTML += `
        <div class="job-card" onclick="openJob('${j.title}','${j.desc}')">
            <div class="top">
                <h3>${j.title}</h3>
                <div class="tag">${j.type}</div>
            </div>
            <p>${j.desc}</p>
            <button class="btn">View Details</button>
        </div>
        `;
    });
}

// filter
function filter(type, btn){
    currentFilter = type;
    document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
}

// search
document.getElementById("search").addEventListener("input", render);

// open popup
function openJob(title, desc){
    document.getElementById("popup").style.display = "block";
    document.getElementById("title").innerText = title;
    document.getElementById("desc").innerText = desc;
}

// apply
function apply(){
    alert("Application submitted successfully!");
}

// close
function closePopup(){
    document.getElementById("popup").style.display = "none";
}

render();
</script>

</body>
</html>
