<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logout - SkillOrbit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#0b1220,#020617);
  font-family:Segoe UI;
  color:white;
}

.card{
  width:350px;
  padding:30px;
  text-align:center;
  background:rgba(30,41,59,0.8);
  border:1px solid #22c55e;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

h2{
  color:#22c55e;
  margin-bottom:10px;
}

p{
  color:#cbd5e1;
  margin-bottom:20px;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.logout{
  background:#ef4444;
  color:white;
}

.cancel{
  background:#0f172a;
  color:#22c55e;
  border:1px solid #22c55e;
}

</style>
</head>

<body>

<div class="card">
  <h2>Logout Confirmation</h2>
  <p>Are you sure you want to logout from SkillOrbit?</p>

  <button class="btn logout" onclick="logout()">Yes, Logout</button>
  <button class="btn cancel" onclick="cancel()">Cancel</button>
</div>

<script>
function logout(){
  localStorage.removeItem("session");
  alert("Logged out successfully");
  window.location.href = "HoMe.html";
}

function cancel(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
