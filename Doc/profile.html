<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillOrbit - Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
    color:#e2e8f0;
}

/* HEADER */
.header{
    padding:20px 5%;
    background:#1e293b;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:1.5rem;
    font-weight:bold;
}
.logo span{ color:#22c55e; }

.back-btn{
    background:#22c55e;
    padding:8px 12px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    color:#0f172a;
    font-weight:600;
}

/* PROFILE */
.profile-container{
    padding:30px 5%;
}

.profile-card{
    background:#1e293b;
    border-radius:15px;
    padding:25px;
    text-align:center;
}

.profile-img{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#22c55e;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2rem;
    margin:0 auto 15px;
}

.info{
    margin-top:20px;
    text-align:left;
}

.field{
    margin-bottom:15px;
}

.label{
    font-size:0.8rem;
    color:#94a3b8;
}

.view-text{
    font-size:1rem;
    margin-top:5px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:8px;
    background:#0f172a;
    color:white;
    display:none;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.edit-btn{ background:#22c55e; }
.save-btn{ background:#22c55e; display:none; }
.cancel-btn{ background:#334155; display:none; }
</style>
</head>

<body>

<div class="header">
    <div class="logo">SKILL<span>ORBIT</span></div>

    <!-- FIXED BACK BUTTON -->
    <button onclick="goBack()" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </button>
</div>

<div class="profile-container">

<div class="profile-card">
    <div class="profile-img">
        <i class="fas fa-user"></i>
    </div>

    <h2>Your Profile</h2>

    <div class="info">

        <div class="field">
            <div class="label">Full Name</div>
            <div class="view-text" id="nameText">John Doe</div>
            <input type="text" id="nameInput" value="John Doe">
        </div>

        <div class="field">
            <div class="label">Email</div>
            <div class="view-text" id="emailText">john@email.com</div>
            <input type="email" id="emailInput" value="john@email.com">
        </div>

        <div class="field">
            <div class="label">Phone</div>
            <div class="view-text" id="phoneText">0123456789</div>
            <input type="text" id="phoneInput" value="0123456789">
        </div>

        <div class="field">
            <div class="label">Bio</div>
            <div class="view-text" id="bioText">Learning enthusiast 🚀</div>
            <input type="text" id="bioInput" value="Learning enthusiast 🚀">
        </div>

    </div>

    <button class="btn edit-btn" onclick="editProfile()">Edit Profile</button>
    <button class="btn save-btn" onclick="saveProfile()">Save</button>
    <button class="btn cancel-btn" onclick="cancelEdit()">Cancel</button>

</div>

</div>

<script>
// FIX: back navigation
function goBack(){
    if(history.length > 1){
        history.back();
    } else {
        window.location.href = "More.html";
    }
}

// FIX: page restore issue (VERY IMPORTANT)
window.addEventListener("pageshow", function(event) {
    if (event.persisted) {
        window.location.reload();
    }
});

function editProfile(){
    toggleEdit(true);
}

function saveProfile(){
    document.getElementById("nameText").innerText = document.getElementById("nameInput").value;
    document.getElementById("emailText").innerText = document.getElementById("emailInput").value;
    document.getElementById("phoneText").innerText = document.getElementById("phoneInput").value;
    document.getElementById("bioText").innerText = document.getElementById("bioInput").value;

    toggleEdit(false);
}

function cancelEdit(){
    toggleEdit(false);
}

function toggleEdit(edit){
    let inputs = document.querySelectorAll("input");
    let texts = document.querySelectorAll(".view-text");

    inputs.forEach(i => i.style.display = edit ? "block" : "none");
    texts.forEach(t => t.style.display = edit ? "none" : "block");

    document.querySelector(".edit-btn").style.display = edit ? "none" : "block";
    document.querySelector(".save-btn").style.display = edit ? "block" : "none";
    document.querySelector(".cancel-btn").style.display = edit ? "block" : "none";
}
</script>

</body>
</html>
