<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillOrbit - Payment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    background:#0b120e;
    color:#fff;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:#0f1a14;
    border-bottom:2px solid #1f3a2b;
}

.logo{
    color:#00ff88;
    font-size:20px;
    font-weight:bold;
}

.nav-links button{
    background:none;
    border:none;
    color:#ccc;
    margin:0 8px;
    cursor:pointer;
    padding:8px 10px;
    border-radius:6px;
    transition:0.3s;
}

.nav-links button:hover,
.nav-links button.active{
    background:#00ff88;
    color:#000;
}

/* MAIN */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:90vh;
}

/* BOX */
.payment-box{
    width:450px;
    background:#0f1a14;
    border:2px solid #1f3a2b;
    border-radius:15px;
    padding:25px;
}

/* SECTIONS */
.section{display:none;}
.active-section{display:block;}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #1f3a2b;
    background:#0b120e;
    color:#fff;
}

/* BUTTON */
.pay-btn{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#00ff88;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

/* CARD */
.card{
    background:#13241b;
    padding:10px;
    border-radius:10px;
    border:1px solid #1f3a2b;
    margin-top:10px;
}

/* TOAST */
.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#00ff88;
    color:#000;
    padding:12px 18px;
    border-radius:8px;
    display:none;
    font-weight:bold;
}

/* PAYMENT METHODS */
.method-box{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.method{
    flex:1;
    text-align:center;
    padding:8px;
    border:1px solid #1f3a2b;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.method.active{
    background:#00ff88;
    color:#000;
}

/* SHAKE */
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">SkillOrbit</div>

    <div class="nav-links">
        <button onclick="window.location.href='home.html'">🏠 Home</button>
        <button class="active" onclick="openTab('payment',this)">💳 Payment</button>
        <button onclick="openTab('invoice',this)">📄 Invoice</button>
        <button onclick="openTab('history',this)">📊 History</button>
    </div>
</div>

<div class="container">

<!-- PAYMENT -->
<div class="payment-box section active-section" id="payment">
    <h2>Secure Checkout</h2>

    <div class="method-box">
        <div class="method" onclick="setMethod('card',this)">Card</div>
        <div class="method" onclick="setMethod('bkash',this)">bKash</div>
        <div class="method" onclick="setMethod('nagad',this)">Nagad</div>
    </div>

    <div id="paymentForm"></div>

    <button class="pay-btn" onclick="pay()">Pay Now</button>
</div>

<!-- INVOICE -->
<div class="payment-box section" id="invoice">
    <h2>Invoice Generator</h2>

    <input placeholder="Course Name">
    <input placeholder="Amount">

    <button class="pay-btn" onclick="generateInvoice()">Generate Invoice</button>

    <div id="invoiceBox"></div>
</div>

<!-- HISTORY -->
<div class="payment-box section" id="history">
    <h2>Transaction History</h2>

    <div class="card">✔ Web Dev Course - $49</div>
    <div class="card">✔ UI Design Course - $20</div>
    <div class="card">✔ JS Basics - $15</div>

    <button class="pay-btn" onclick="clearHistory()">Clear History</button>
</div>

</div>

<div class="toast" id="toast">Success 🎉</div>

<script>

let method = ""; // NO DEFAULT SELECTION

/* INIT */
window.onload = function () {
    method = "";
};

/* SWITCH METHOD */
function setMethod(type, el){
    method = type;

    document.querySelectorAll(".method").forEach(m=>m.classList.remove("active"));
    el.classList.add("active");

    let form = document.getElementById("paymentForm");

    if(type === "card"){
        form.innerHTML = `
        <input placeholder="Card Holder Name">
        <input placeholder="Card Number">
        <input placeholder="MM/YY">
        <input placeholder="CVV">
        <input placeholder="Billing Address">
        `;
    }

    if(type === "bkash" || type === "nagad"){
        form.innerHTML = `
        <input placeholder="${type.toUpperCase()} Number">
        <input placeholder="Amount">
        <input placeholder="PIN">
        `;
    }
}

/* PAY VALIDATION */
function pay(){

    let inputs = document.querySelectorAll("#paymentForm input");
    let empty = false;
    let firstEmpty = null;

    // CHECK METHOD
    if(!method){
        showToast("❌ Please select payment method");
        return;
    }

    // CHECK INPUTS
    inputs.forEach(input=>{
        input.style.border = "1px solid #1f3a2b";

        if(input.value.trim() === ""){
            empty = true;
            input.style.border = "2px solid red";

            if(!firstEmpty){
                firstEmpty = input;
            }
        }
    });

    if(empty){
        showToast("❌ Please fill all fields");

        if(firstEmpty){
            firstEmpty.focus();
            firstEmpty.style.animation = "shake 0.3s";
            setTimeout(()=>firstEmpty.style.animation="",300);
        }
        return;
    }

    showToast("Payment via " + method.toUpperCase() + " Successful 🎉");
}

/* INVOICE */
function generateInvoice(){
    document.getElementById("invoiceBox").innerHTML = `
        <div class="card">
            Invoice Generated ✔<br>
            Status: Paid<br>
            Method: ${method.toUpperCase() || "NOT SELECTED"}
        </div>
    `;
    showToast("Invoice Created 📄");
}

/* HISTORY */
function clearHistory(){
    document.getElementById("history").innerHTML = `
        <h2>Transaction History</h2>
        <div class="card">No history available</div>
    `;
    showToast("History Cleared 🗑");
}

/* TOAST */
function showToast(msg){
    let t=document.getElementById("toast");
    t.innerText=msg;
    t.style.display="block";

    setTimeout(()=>t.style.display="none",2000);
}

/* TAB SWITCH */
function openTab(id,btn){

    document.querySelectorAll(".nav-links button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active-section"));
    document.getElementById(id).classList.add("active-section");
}

</script>

</body>
</html>
