
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillOrbit - Saved</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
    color:#e2e8f0;
}

/* HEADER */
.header{
    padding:20px 5%;
    background:#1e293b;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:1.5rem;
    font-weight:bold;
}
.logo span{ color:#22c55e; }

.back-btn{
    background:#22c55e;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
    color:#0f172a;
    font-weight:600;
}

/* SEARCH */
.search{
    padding:15px 5%;
}

.search input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
}

/* FILTER */
.filter{
    display:flex;
    gap:10px;
    padding:0 5%;
    margin-bottom:10px;
}

.filter button{
    flex:1;
    padding:8px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
    cursor:pointer;
}

.filter button.active{
    background:#22c55e;
    color:#0f172a;
}

/* CONTAINER */
.container{
    padding:10px 5%;
}

/* CARD */
.saved-card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
}

.saved-card:hover{
    transform:translateY(-3px);
    border:1px solid #22c55e;
}

.info h3{
    font-size:1rem;
}
.info p{
    font-size:0.8rem;
    color:#94a3b8;
}

/* BOOKMARK */
.bookmark{
    font-size:1.2rem;
    color:#22c55e;
    cursor:pointer;
}

/* EMPTY */
.empty{
    text-align:center;
    margin-top:50px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">SKILL<span>ORBIT</span></div>
    <a href="More.html" class="back-btn">← Back</a>
</div>

<!-- SEARCH -->
<div class="search">
    <input type="text" id="searchInput" placeholder="Search saved items...">
</div>

<!-- FILTER -->
<div class="filter">
    <button class="active" onclick="filterItems('all', this)">All</button>
    <button onclick="filterItems('course', this)">Courses</button>
    <button onclick="filterItems('video', this)">Videos</button>
</div>

<div class="container" id="savedContainer"></div>

<script>
let savedItems = [
    {title:"HTML Basics", desc:"Learn structure of web", type:"course"},
    {title:"Flexbox Guide", desc:"CSS layout mastery", type:"course"},
    {title:"JS Intro Video", desc:"Start JavaScript", type:"video"},
    {title:"Responsive Design", desc:"Make mobile UI", type:"course"}
];

let currentFilter = "all";

// render
function renderSaved(){
    let container = document.getElementById("savedContainer");
    let search = document.getElementById("searchInput").value.toLowerCase();

    container.innerHTML = "";

    let filtered = savedItems.filter(item => {
        let matchFilter = currentFilter === "all" || item.type === currentFilter;
        let matchSearch = item.title.toLowerCase().includes(search);
        return matchFilter && matchSearch;
    });

    if(filtered.length === 0){
        container.innerHTML = `<div class="empty">No saved items found 😕</div>`;
        return;
    }

    filtered.forEach((item, index) => {
        container.innerHTML += `
        <div class="saved-card" onclick="openItem('${item.title}')">
            <div class="info">
                <h3>${item.title}</h3>
                <p>${item.desc}</p>
            </div>
            <i class="fas fa-bookmark bookmark" onclick="toggleSave(event, ${index})"></i>
        </div>
        `;
    });
}

// filter
function filterItems(type, btn){
    currentFilter = type;

    document.querySelectorAll(".filter button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    renderSaved();
}

// search
document.getElementById("searchInput").addEventListener("input", renderSaved);

// remove/save toggle
function toggleSave(e, index){
    e.stopPropagation();
    savedItems.splice(index,1);
    renderSaved();
}

// open item
function openItem(title){
    alert("Opening: " + title);
}

renderSaved();
</script>

</body>
</html>
