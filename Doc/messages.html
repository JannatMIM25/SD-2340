<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillOrbit - Messages</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
    color:#e2e8f0;
}

/* HEADER */
.header{
    padding:20px 5%;
    background:#1e293b;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:1.5rem;
    font-weight:bold;
}
.logo span{ color:#22c55e; }

.back-btn{
    background:#22c55e;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
    color:#0f172a;
    font-weight:600;
}

/* SEARCH */
.search{
    padding:15px 5%;
}

.search input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    outline:none;
}

/* CONTAINER */
.container{
    padding:10px 5%;
}

/* CHAT LIST */
.chat{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
}

.chat:hover{
    transform:translateY(-3px);
    border:1px solid #22c55e;
}

/* LEFT */
.left{
    display:flex;
    gap:10px;
    align-items:center;
}

/* AVATAR */
.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#0f172a;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid #334155;
    color:#22c55e;
}

/* TEXT */
.name{
    font-weight:600;
}

.msg{
    font-size:0.8rem;
    color:#94a3b8;
}

/* TIME */
.time{
    font-size:0.7rem;
    color:#94a3b8;
}

/* CHAT BOX */
.chatbox{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#1e293b;
    border-top:1px solid #334155;
    padding:10px;
    display:none;
}

.messages{
    max-height:250px;
    overflow-y:auto;
    padding:10px;
}

.bubble{
    padding:8px 12px;
    border-radius:10px;
    margin-bottom:8px;
    max-width:70%;
}

.me{
    background:#22c55e;
    color:#0f172a;
    margin-left:auto;
}

.bot{
    background:#0f172a;
    border:1px solid #334155;
}

/* INPUT */
.input-area{
    display:flex;
    gap:10px;
}

.input-area input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#0f172a;
    color:white;
    outline:none;
}

.input-area button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:#0f172a;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">SKILL<span>ORBIT</span></div>
    <a href="More.html" class="back-btn">← Back</a>
</div>

<!-- SEARCH -->
<div class="search">
    <input type="text" id="search" placeholder="Search messages...">
</div>

<div class="container" id="container"></div>

<!-- CHAT BOX -->
<div class="chatbox" id="chatbox">

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button onclick="sendMsg()">Send</button>
    </div>

</div>

<script>

let chats = [
    {name:"Support Team", msg:"How can we help you?", time:"10:30"},
    {name:"Course Bot", msg:"New lesson available", time:"09:10"},
    {name:"Admin", msg:"Your profile is verified", time:"Yesterday"}
];

let activeChat = "";

// render list
function render(){
    let box = document.getElementById("container");
    let search = document.getElementById("search").value.toLowerCase();

    box.innerHTML = "";

    chats.filter(c => c.name.toLowerCase().includes(search))
    .forEach(c => {
        box.innerHTML += `
        <div class="chat" onclick="openChat('${c.name}')">
            <div class="left">
                <div class="avatar"><i class="fas fa-user"></i></div>
                <div>
                    <div class="name">${c.name}</div>
                    <div class="msg">${c.msg}</div>
                </div>
            </div>
            <div class="time">${c.time}</div>
        </div>
        `;
    });
}

// open chat
function openChat(name){
    activeChat = name;
    document.getElementById("chatbox").style.display = "block";
    document.getElementById("messages").innerHTML = `
        <div class="bubble bot">Chat started with ${name}</div>
    `;
}

// send message
function sendMsg(){
    let input = document.getElementById("msgInput");
    let text = input.value;
    if(text==="") return;

    document.getElementById("messages").innerHTML += `
        <div class="bubble me">${text}</div>
    `;

    input.value = "";
}

document.getElementById("search").addEventListener("input", render);

render();

</script>

</body>
</html>
